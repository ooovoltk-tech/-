
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <!-- Подключаем Tailwind CSS для стилизации -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем шрифт Inter для красивой типографики -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Скрываем стрелочки у поля с числом (возраст) */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4 text-gray-800">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 transform transition-all">
        <!-- Заголовок -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Создать аккаунт</h1>
            <p class="text-gray-500 text-sm">Пожалуйста, заполните форму ниже для регистрации</p>
        </div>

        <form id="registrationForm" class="space-y-5">
            
            <!-- Переключатель роли (Исполнитель / Заказчик) -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Кто вы?</label>
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <label class="flex-1 text-center relative cursor-pointer">
                        <input type="radio" name="role" value="contractor" class="peer hidden" checked>
                        <span class="block py-2.5 px-4 rounded-lg text-sm font-medium text-gray-500 transition-all duration-200 peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm">
                            Исполнитель
                        </span>
                    </label>
                    <label class="flex-1 text-center relative cursor-pointer">
                        <input type="radio" name="role" value="customer" class="peer hidden">
                        <span class="block py-2.5 px-4 rounded-lg text-sm font-medium text-gray-500 transition-all duration-200 peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm">
                            Заказчик
                        </span>
                    </label>
                </div>
            </div>

            <!-- Имя и Фамилия -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Иван" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>
                <div>
                    <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">Фамилия</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Иванов" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>
            </div>

            <!-- Возраст и Телефон -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="age" class="block text-sm font-medium text-gray-700 mb-1">Возраст</label>
                    <input type="number" id="age" name="age" placeholder="18" min="14" max="120" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Номер телефона</label>
                    <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>
            </div>

            <!-- Электронная почта -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Электронная почта</label>
                <input type="email" id="email" name="email" placeholder="ivan@example.com" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
            </div>

            <!-- Кнопка регистрации -->
            <div class="pt-2">
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 flex justify-center items-center">
                    <span>Зарегистрироваться</span>
                </button>
            </div>
            
            <!-- Дополнительный текст (для реалистичности) -->
            <p class="text-xs text-center text-gray-500 mt-4">
                Нажимая кнопку, вы соглашаетесь с 
                <a href="#" class="text-blue-600 hover:underline">условиями использования</a> и 
                <a href="#" class="text-blue-600 hover:underline">политикой конфиденциальности</a>.
            </p>
        </form>
    </div>

    <!-- Небольшой скрипт для имитации отправки формы -->
    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Предотвращаем перезагрузку страницы
            
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            
            // Имитация загрузки и успешной отправки
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Отправка...`;
            btn.classList.replace('bg-blue-600', 'bg-blue-500');
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = `<span>Успешно!</span>`;
                btn.classList.replace('bg-blue-500', 'bg-green-500');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-600');
                btn.classList.replace('focus:ring-blue-500', 'focus:ring-green-500');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-500', 'bg-blue-600');
                    btn.classList.replace('hover:bg-green-600', 'hover:bg-blue-700');
                    btn.classList.replace('focus:ring-green-500', 'focus:ring-blue-500');
                    btn.disabled = false;
                    document.getElementById('registrationForm').reset(); // Очищаем форму
                }, 3000);
            }, 1500);
        });
    </script>
</body>
</html>
